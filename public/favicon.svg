<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#110b1d"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect x="6" y="6" width="500" height="500" rx="90" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.25"/>
  <!-- Z letter with glow -->
  <path d="M 110 115 L 402 115 L 402 175 L 210 345 L 402 345 L 402 405 L 110 405 L 110 345 L 302 175 L 110 175 Z" fill="url(#grad)" filter="url(#glow)"/>
</svg>
